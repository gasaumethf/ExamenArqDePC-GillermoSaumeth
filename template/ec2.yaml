AWSTemplateFormatVersion: '2010-09-09'
Description: Examen Final - Arquitectura de Computadores

Resources:

  ServerSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Acceso HTTP puerto 80
      Tags:
        - Key: Name
          Value: SG-Examen-GillermoSaumeth
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 80
          ToPort: 80
          CidrIp: 0.0.0.0/0

  ExamenEC2:
    Type: AWS::EC2::Instance
    Properties:
      AvailabilityZone: us-east-1a
      ImageId: ami-0236922087fa98b6e
      InstanceType: t2.micro
      SecurityGroups:
        - !Ref ServerSecurityGroup
      Tags:
        - Key: Name
          Value: EC2-Examen-GillermoSaumeth
      UserData:
        Fn::Base64: |
          #!/bin/bash
          yum update -y
          yum install -y httpd
          systemctl start httpd
          systemctl enable httpd
          cat > /var/www/html/index.html << 'EOF'
          <!DOCTYPE html>
          <html lang="es">
          <head>
            <meta charset="UTF-8">
            <title>Examen Final</title>
            <style>
              body {
                font-family: Arial, sans-serif;
                background: #1a1a2e;
                display: flex;
                justify-content: center;
                align-items: center;
                height: 100vh;
                margin: 0;
              }
              .card {
                background: white;
                border-radius: 16px;
                padding: 40px 60px;
                text-align: center;
                box-shadow: 0 8px 32px rgba(0,0,0,0.3);
              }
              h1 { color: #e94560; }
              p { font-size: 1.2em; color: #333; }
            </style>
          </head>
          <body>
            <div class="card">
              <h1>Examen Final Arquitectura de Computadores</h1>
              <p><strong>Nombre:</strong> Gillermo Saumeth</p>
              <p><strong>Código:</strong> 2383912 2 1805</p>
              <script>
                const p = document.createElement('p');
                p.innerHTML = '<strong>Fecha:</strong> ' + new Date().toLocaleDateString('es-CO');
                document.querySelector('.card').appendChild(p);
              </script>
            </div>
          </body>
          </html>
          EOF

Outputs:
  InstanceId:
    Value: !Ref ExamenEC2